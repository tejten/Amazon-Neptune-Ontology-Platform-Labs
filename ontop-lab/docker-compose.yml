services:
  db:
    image: postgres:16
    container_name: kg-lab-rms-postgres
    environment:
      POSTGRES_DB: rms
      POSTGRES_USER: ontop
      POSTGRES_PASSWORD: ontop
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - rms-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ontop -d rms"]
      interval: 5s
      timeout: 5s
      retries: 20

  ontop:
    image: ontop/ontop:latest
    container_name: kg-lab-ontop
    depends_on:
      db:
        condition: service_healthy
    environment:
      ONTOP_ONTOLOGY_FILE: /opt/ontop/input/aero-rms.owl
      ONTOP_MAPPING_FILE: /opt/ontop/input/rms.obda
      ONTOP_PROPERTIES_FILE: /opt/ontop/input/rms.properties
      ONTOP_CORS_ALLOWED_ORIGINS: "*"
      ONTOP_LAZY_INIT: "true"
      ONTOP_DEV_MODE: "true"
    volumes:
      - ./input:/opt/ontop/input:ro
      - ./jdbc:/opt/ontop/jdbc:ro
    ports:
      - "8080:8080"

volumes:
  rms-postgres-data:

